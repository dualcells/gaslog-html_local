name: Deploy to Host

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to host via SSH/rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          echo "DEBUG: KEY_LEN=${#SSH_PRIVATE_KEY}"
          echo "DEBUG: HOST=$SSH_HOST"
          echo "DEBUG: USER=$SSH_USER"
          echo "DEBUG: PATH=$DEPLOY_PATH"
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 21098 -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "key written, size=$(wc -c < ~/.ssh/id_ed25519)"
          echo "trying ssh..."
          ssh -p 21098 -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" "echo OK && pwd"
          rsync -rv --delete-after --delete-excluded \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            --exclude='*.yml' \
            --exclude='package.json' \
            --exclude='AGENTS.md' \
            --exclude='node_modules' \
            -e "ssh -p 21098 -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519" \
            . "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"
